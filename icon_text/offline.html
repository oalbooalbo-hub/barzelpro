<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | BARZELPRO</title>
    <style>
        body {
            background-color: #0a0a0a; /* Matches your manifest theme */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { padding: 20px; }
        h1 { font-size: 2rem; margin-bottom: 10px; color: #ff3e3e; /* Accent color */ }
        p { color: #aaaaaa; margin-bottom: 30px; line-height: 1.5; }
        
        .retry-btn {
            background-color: #ffffff;
            color: #0a0a0a;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡❌</div>
        <h1>You're Offline</h1>
        <p>It looks like your connection dropped.<br>
           Don't worry, your workout progress is saved locally.</p>
        
        <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
