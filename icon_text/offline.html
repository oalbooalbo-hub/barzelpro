<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Offline</title>
  <link rel="icon" href="./logo.svg" type="image/svg+xml">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:#0a0a0a;
      color:#f0f0f0;
      font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      min-height:100dvh;
      padding:max(env(safe-area-inset-top),48px) 24px max(env(safe-area-inset-bottom),40px);
      text-align:center;
    }
    .top{display:flex;flex-direction:column;align-items:center;}
    .logo{width:clamp(140px,45vw,200px);height:auto;}
    .middle{display:flex;flex-direction:column;align-items:center;gap:16px;}
    .icon{font-size:48px;line-height:1;}
    h1{font-size:24px;font-weight:700;color:#f0f0f0;}
    p{font-size:15px;color:#666;line-height:1.6;max-width:280px;}
    .bottom{width:100%;max-width:380px;}
    .retry-btn{
      width:100%;
      padding:16px;
      background:#e8ff47;
      color:#000;
      border:none;
      border-radius:12px;
      font-family:inherit;
      font-size:17px;
      font-weight:900;
      cursor:pointer;
      letter-spacing:.3px;
    }
    .retry-btn:active{opacity:.85;}
  </style>
</head>
<body>
  <div class="top">
    <img src="./logo.svg" alt="logo" class="logo" onerror="this.style.display='none'">
  </div>

  <div class="middle">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Your connection dropped.<br>Your workout data is saved locally and will sync when you're back online.</p>
  </div>

  <div class="bottom">
    <button class="retry-btn" onclick="window.location.reload()">TRY AGAIN</button>
  </div>
</body>
</html>
