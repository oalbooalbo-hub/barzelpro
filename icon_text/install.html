<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#47d1ff">
  <meta name="description" content="Track your workouts, monitor progress, and crush your fitness goals.">
  <link rel="icon" href="./logo.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="./logo.svg">
  <title>BarzelPro — Install</title>
  <link rel="manifest" href="./manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0a0a0a;
      --surface:#141414;
      --border:#2a2a2a;
      --accent:#e8ff47;
      --text:#f0f0f0;
      --muted:#666;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* אנימציית כניסה למניעת הבהוב */
    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 24px) 24px env(safe-area-inset-bottom, 24px);
      animation: fadeIn 0.4s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      justify-content: center;
    }

    .logo-img {
      width: clamp(200px, 70vw, 300px);
      height: auto;
      object-fit: contain;
    }

    .logo-sub {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .bottom {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .btn-install {
      width: 100%;
      padding: 22px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 28px;
      font-family: inherit;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1.2px;
      cursor: pointer;
      display: none; /* יוצג רק אם נתפס אירוע באנדרואיד */
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform 0.1s;
    }

    .btn-install:active { transform: scale(0.96); }

    .btn-open {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
    }

    /* iOS Styles */
    @keyframes bounceDown {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(10px); }
      60% { transform: translateY(5px); }
    }
    .bounce-arrow { animation: bounceDown 2s infinite; }
  </style>
</head>
<body>

<div class="screen">
  <div class="top">
    <img src="./logo.svg" alt="BarzelPro" class="logo-img" width="280" height="120" fetchpriority="high">
    <div class="logo-sub">Workout Tracker</div>
  </div>

  <div class="bottom">
    <button class="btn-install" id="btn-install" onclick="triggerInstall()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2v13M7 11l5 5 5-5"/><line x1="3" y1="19" x2="21" y2="19"/>
      </svg>
      INSTALL APP
    </button>
    <button class="btn-open" id="btn-open" onclick="openApp()">
      Open in Browser
    </button>
  </div>
</div>

    <div style="width:36px; height:4px; background:#48484a; border-radius:2px; margin:0 auto 20px;"></div>
